# Multinex SDK Public Configuration Example

agent:
  name: "model-router"
  policies:
    - "sensitive-data-control"
    - "destructive-action-control"

api:
  endpoint: "https://api.multinex.ai/v1"
  environment: "production"
  timeoutMs: 15000

telemetry:
  enabled: true
  exportDestination: "customer-audit-sink"
